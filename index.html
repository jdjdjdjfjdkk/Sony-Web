<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sony Global - Powered by Kaveen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; }
        .channel-list { height: 80vh; overflow-y: auto; background: #111; padding: 10px; border-radius: 10px; }
        .channel-card { display: flex; align-items: center; padding: 10px; margin-bottom: 5px; cursor: pointer; background: #222; border-radius: 5px; }
        .channel-card:hover { background: #007bff; }
        .channel-card img { width: 45px; height: 30px; margin-right: 15px; object-fit: contain; }
        .vjs-player { width: 100%; height: 450px; }
    </style>
</head>
<body>
<div class="container-fluid p-4">
    <div class="row">
        <div class="col-md-8">
            <video id="player" class="video-js vjs-fluid vjs-default-skin vjs-big-play-centered" controls></video>
            <h4 id="title" class="mt-3 text-info">Select a Channel</h4>
        </div>
        <div class="col-md-4">
            <h4>Channel List</h4>
            <div id="list" class="channel-list">Loading...</div>
        </div>
    </div>
</div>
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const player = videojs('player');
    const m3u = "https://sony.rojoni9589.workers.dev/playlist.m3u?token=teachub12398";
    
    // අපේ Proxy API එක හරහා Data ලබා ගැනීම
    async function load() {
        const res = await fetch(`/api/proxy?url=${encodeURIComponent(m3u)}`);
        const data = await res.text();
        const lines = data.split('\n');
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        let obj = {};
        lines.forEach(l => {
            if(l.includes('#EXTINF')) {
                obj.name = l.split(',')[1].trim();
                obj.logo = l.match(/tvg-logo="([^"]+)"/)?.[1] || "";
            } else if(l.startsWith('http')) {
                const d = document.createElement('div');
                d.className = "channel-card";
                d.innerHTML = `<img src="${obj.logo}"><span>${obj.name}</span>`;
                const streamUrl = l.trim();
                d.onclick = () => {
                    // ස්ට්‍රීම් එකත් Proxy හරහා යැවීම
                    player.src({ src: `/api/proxy?url=${encodeURIComponent(streamUrl)}`, type: 'application/x-mpegURL' });
                    player.play();
                    document.getElementById('title').innerText = obj.name;
                };
                list.appendChild(d);
                obj = {};
            }
        });
    }
    load();
</script>
</body>
</html>
