<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Global Player | Kaveen Chamodya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .sidebar { height: 100vh; background: #111; border-right: 1px solid #333; overflow-y: auto; padding: 15px; }
        .search-box { background: #222; border: none; color: white; margin-bottom: 15px; border-radius: 5px; }
        .channel-card { 
            display: flex; align-items: center; padding: 10px; background: #1a1a1a; 
            margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .channel-card:hover { background: #007bff; }
        .channel-card img { width: 45px; height: 30px; object-fit: contain; margin-right: 12px; }
        .player-container { padding: 20px; position: sticky; top: 0; }
        .video-js { width: 100% !important; height: 450px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-4 sidebar">
            <h4 class="text-primary mb-3">Sony Channels</h4>
            <input type="text" id="search" class="form-control search-box" placeholder="Search channels...">
            <div id="channel-list"><p class="text-secondary">Loading playlist...</p></div>
        </div>

        <div class="col-md-8 player-container">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
            <div class="mt-4 p-3 bg-dark rounded">
                <h4 id="now-playing">Select a channel to play</h4>
                <p class="text-secondary mb-0">Powered by Kaveen Chamodya</p>
            </div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const player = videojs('my-video');
    const m3uUrl = "https://sony.rojoni9589.workers.dev/playlist.m3u?token=teachub12398";
    let allChannels = [];

    async function loadData() {
        try {
            const res = await fetch(`/api/proxy?url=${encodeURIComponent(m3uUrl)}`);
            const data = await res.text();
            parseM3U(data);
        } catch (e) {
            document.getElementById('channel-list').innerHTML = "Proxy connection failed.";
        }
    }

    function parseM3U(content) {
        const lines = content.split('\n');
        let current = {};
        allChannels = [];

        lines.forEach(line => {
            if (line.includes('#EXTINF')) {
                current.name = line.split(',')[1].trim();
                current.logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "https://via.placeholder.com/50";
            } else if (line.startsWith('http')) {
                current.url = line.trim();
                allChannels.push(current);
                current = {};
            }
        });
        displayChannels(allChannels);
    }

    function displayChannels(channels) {
        const listDiv = document.getElementById('channel-list');
        listDiv.innerHTML = "";
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = "channel-card";
            div.innerHTML = `<img src="${ch.logo}"> <span>${ch.name}</span>`;
            div.onclick = () => {
                player.src({ src: `/api/proxy?url=${encodeURIComponent(ch.url)}`, type: 'application/x-mpegURL' });
                player.play();
                document.getElementById('now-playing').innerText = "Playing: " + ch.name;
            };
            listDiv.appendChild(div);
        });
    }

    // Search Logic
    document.getElementById('search').oninput = (e) => {
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase()));
        displayChannels(filtered);
    };

    loadData();
</script>
</body>
</html>
